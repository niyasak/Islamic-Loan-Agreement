<!DOCTYPE html>
<html>
<head>
<title>Islamic Loan Agreement</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{
   margin:0;
   font-family:'Poppins',sans-serif;
   background:linear-gradient(135deg,#0f5132,#198754,#14532d);
   min-height:100vh;
   display:flex;
   justify-content:center;
   align-items:center;
   padding:20px;
}
.container{
   width:100%;
   max-width:720px;
   background:rgba(255,255,255,0.12);
   backdrop-filter:blur(15px);
   border-radius:20px;
   padding:30px;
   box-shadow:0 15px 40px rgba(0,0,0,0.3);
   color:white;
}
.title{
   text-align:center;
   font-size:24px;
   font-weight:600;
   margin-bottom:25px;
}
.title span{
   color:#c8a951;
}
input,textarea,select{
   width:100%;
   padding:12px;
   margin-bottom:15px;
   border-radius:12px;
   border:none;
   outline:none;
   background:rgba(255,255,255,0.9);
}
input:focus,textarea:focus{
   box-shadow:0 0 0 3px rgba(200,169,81,0.6);
}
textarea{height:80px;resize:none;}
.btn{
   width:100%;
   padding:12px;
   border:none;
   border-radius:12px;
   font-weight:600;
   margin-bottom:10px;
   cursor:pointer;
   transition:0.3s;
}
.btn-primary{background:#198754;color:white;}
.btn-primary:hover{background:#14532d;}
.btn-gold{background:#c8a951;color:#0f5132;}
.btn-gold:hover{background:#d4b76d;}
.btn-blue{background:#1565c0;color:white;}
.btn-blue:hover{background:#0d47a1;}
.preview{
   margin-top:25px;
   background:white;
   border-radius:20px;
   padding:25px;
   color:#333;
   white-space:pre-wrap;
   box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
.acceptBox{
   background:rgba(255,255,255,0.15);
   padding:15px;
   border-radius:15px;
   margin-top:20px;
}
.status{
   margin-top:10px;
   font-weight:600;
   color:#ffd700;
}
.footer{
   text-align:center;
   margin-top:15px;
   font-size:12px;
   opacity:0.8;
}
</style>
</head>
<body>
<div class="container">
<div class="title">🌿 <span>Islamic Loan Agreement</span></div>
<div id="formSection">
<select id="role">
<option value="">Select Your Role</option>
<option value="Lender">Lender</option>
<option value="Borrower">Borrower</option>
</select>
<input id="lender" placeholder="Lender Name (Full Name As Per Aadhaar)">
<input id="borrower" placeholder="Borrower Name (Full Name As Per Aadhaar)	">
<input id="amount" placeholder="Loan Amount (₹)">
<input id="due" type="date">
<input id="location" placeholder="Location (City, State, Country)">
<textarea id="notes" placeholder="Optional Notes"></textarea>
<button class="btn btn-primary" onclick="generateLink()">Generate & Create Shareable Link</button>
<button class="btn btn-blue" onclick="copyLink()">Copy Share Link</button>
</div>
<div id="acceptSection" style="display:none;" class="acceptBox">
<h3 id="acceptTitle"></h3>
<label>
<input type="checkbox" id="agreeCheck">
I confirm that I agree to the above loan terms.
</label>
<input id="acceptName" placeholder="Type Full Name to Confirm">
<button class="btn btn-primary" onclick="acceptAgreement()">Confirm Acceptance</button>
</div>
<button class="btn btn-gold" onclick="downloadPDF()">Download PDF</button>
<div class="status" id="status"></div>
<div class="preview" id="preview" style="display:none;"></div>
<div class="footer">
Based on Qur'an 2:282 • Electronic agreement valid under Indian IT Act
</div>
</div>
<script>
let agreementData={};
let accepted=false;
let shareLink="";
function generateLink(){
agreementData={
id:"ILA-"+Math.floor(Math.random()*1000000),
role:document.getElementById("role").value,
lender:document.getElementById("lender").value,
borrower:document.getElementById("borrower").value,
amount:document.getElementById("amount").value,
due:document.getElementById("due").value,
location:document.getElementById("location").value,
notes:document.getElementById("notes").value,
created:new Date().toLocaleString()
};
let encoded=btoa(JSON.stringify(agreementData));
shareLink=window.location.origin+window.location.pathname+"?data="+encoded;
document.getElementById("preview").style.display="block";
document.getElementById("preview").innerText=
"Share this link with the other party:\n\n"+shareLink;
}
function copyLink(){
if(!shareLink){alert("Generate link first.");return;}
navigator.clipboard.writeText(shareLink);
alert("Link copied successfully!");
}
window.onload=function(){
let params=new URLSearchParams(window.location.search);
if(params.has("data")){
agreementData=JSON.parse(atob(params.get("data")));
document.getElementById("formSection").style.display="none";
document.getElementById("acceptSection").style.display="block";
document.getElementById("preview").style.display="block";
let waitingParty=agreementData.role==="Lender"?"Borrower":"Lender";
document.getElementById("acceptTitle").innerText=waitingParty+" Acceptance Required";
showAgreement();
}
};
function showAgreement(){
let text=
`ISLAMIC LOAN AGREEMENT
Executed at: ${agreementData.location}
On: ${agreementData.created}
Lender: ${agreementData.lender}
Borrower: ${agreementData.borrower}
Loan Amount: ₹ ${agreementData.amount}
Repayment Due Date: ${agreementData.due}
This loan is free from interest (Riba).
Notes:
${agreementData.notes}
`;
if(accepted){
text+=`
Accepted By: ${agreementData.acceptedBy}
Accepted On: ${agreementData.acceptedOn}
`;
}
document.getElementById("preview").innerText=text;
}
function acceptAgreement(){
if(!document.getElementById("agreeCheck").checked){
alert("Please tick the agreement checkbox.");
return;
}
let name=document.getElementById("acceptName").value;
if(!name){
alert("Please type your full name.");
return;
}
agreementData.acceptedBy=name;
agreementData.acceptedOn=new Date().toLocaleString();
accepted=true;
document.getElementById("status").innerText="Status: ACCEPTED";
showAgreement();
}
function downloadPDF(){
if(!agreementData.id){
alert("No agreement loaded.");
return;
}
const { jsPDF }=window.jspdf;
const doc=new jsPDF();
let w=doc.internal.pageSize.getWidth();
let h=doc.internal.pageSize.getHeight();
/* Elegant Gold Frame */
doc.setDrawColor(200,169,81);
doc.setLineWidth(4);
doc.rect(10,10,w-20,h-20);
doc.setLineWidth(1);
doc.rect(20,20,w-40,h-40);
/* Title */
doc.setFont("times","bold");
doc.setFontSize(20);
doc.text("ISLAMIC LOAN AGREEMENT",w/2,35,{align:"center"});
/* Quran Reference */
doc.setFontSize(11);
doc.setFont("times","italic");
doc.text('"O you who believe, when you contract a debt for a fixed period, write it down..."',
w/2,45,{align:"center"});
doc.text("— Qur'an 2:282",w/2,52,{align:"center"});
/* Body */
doc.setFont("times","normal");
doc.setFontSize(12);
let content=`
Agreement ID: ${agreementData.id}
Place of Agreement: ${agreementData.location}
Date: ${agreementData.created}
--------------------------------------------
PARTIES
Lender: ${agreementData.lender}
Borrower: ${agreementData.borrower}
--------------------------------------------
LOAN TERMS
Loan Amount: ₹ ${agreementData.amount}

Repayment Due Date: ${agreementData.due}

This loan is completely free from interest (Riba). The borrower solemnly acknowledges that this debt is a trust (Amanah)
and a serious obligation before Allah. The borrower understands that debts remain accountable on the Day of Judgment, 
and every obligation will be subject to Hisab (divine accountability). Repayment must be made on or before the due date.
--------------------------------------------
Additional Notes:
${agreementData.notes}
`;
if(accepted){
content+=`
--------------------------------------------
ACCEPTANCE
Accepted By: ${agreementData.acceptedBy}
Accepted On: ${agreementData.acceptedOn}
Electronic agreement valid under Indian IT Act.
`;
}
let lines=doc.splitTextToSize(content,w-60);
doc.text(lines,30,65);
/* Signature Section */
doc.line(40,h-60,100,h-60);
doc.line(w-100,h-60,w-40,h-60);
doc.text("Lender Signature",40,h-52);
doc.text("Borrower Signature",w-100,h-52);
doc.save("Islamic_Loan_Agreement_"+agreementData.id+".pdf");
}

</script>
</body>
</html>
